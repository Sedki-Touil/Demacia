<div class="boxe">
<div class="carte">
  <h1>Connexion</h1>
  <p class="demande">Connectez-vous à votre compte</p>

  <form (ngSubmit)="onLogin()">
    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        name="email"
        required
        placeholder="Votre email"
      />
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        name="password"
        required
        placeholder="Votre mot de passe"
      />
    </div>

    <button class="login-btn"
      type="submit"
      [disabled]="loading"
    >
      {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
    </button>
  </form>
  <div class="erreur" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <p class="register">
      Vous n'avez pas de compte ?
      <a routerLink="/register">S'inscrire</a>
      </p>

</div>
</div>
