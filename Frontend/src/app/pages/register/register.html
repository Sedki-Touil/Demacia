<div class="boxe">
<div class="carte">
  <h1>Inscription</h1>
  <p class="demande">Créez votre compte pour accéder à nos services</p>
  <form (ngSubmit)="onRegister()">
    <div class="form-group">
      <label>Prénom</label>
      <input [(ngModel)]="data.firstName" name="firstName" placeholder="Votre prénom" required >
    </div>
    <div class="form-group">
      <label>Nom</label>
      <input [(ngModel)]="data.lastName" name="lastName" placeholder="Votre nom" required >
    </div>
    <div class="form-group">
      <label>Email</label>
    <input [(ngModel)]="data.email" name="email" placeholder="votre.email@example.com" required ><br>
    </div>
    <div class="form-group">
    <label>Mot de passe</label>
    <input [(ngModel)]="data.password" name="password" type="password" placeholder="Votre mot de passe" required ><br>
    </div>
    <div class="form-group">
    <label>Confirmer le mot de passe</label>
    <input [(ngModel)]="data.confirmPassword" name="confirmPassword" type="password" placeholder="Confirmez votre mot de passe" required ><br>
    </div>
    <button type="submit">S'inscrire</button>
    <p class="login">Vous avez déjà un compte ? <a routerLink="/login">Se connecter</a></p>
  </form>
</div>
