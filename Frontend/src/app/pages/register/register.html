<div class="auth-container">
  <app-auth-left></app-auth-left>

  <div class="right-panel">
    <div class="form-wrapper">
      <h1>Inscription</h1>
      <p class="subtitle">Créez votre compte pour accéder à nos services</p>

      <form (ngSubmit)="onRegister()">
        <div class="form-row">
          <div class="form-group half">
            <label>Prénom</label>
            <input [(ngModel)]="data.firstName" name="firstName" placeholder="Votre prénom" required>
          </div>

          <div class="form-group half">
            <label>Nom</label>
            <input [(ngModel)]="data.lastName" name="lastName" placeholder="Votre nom" required>
          </div>
        </div>

        <div class="form-group full">
          <label>Email</label>
          <input [(ngModel)]="data.email" name="email" placeholder="votre.email@example.com" required>
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label>Téléphone</label>
            <input [(ngModel)]="data.phone" name="phone" type="tel" placeholder="+216 XX XXX XXX" required>
          </div>

          <div class="form-group half">
            <label>Ville</label>
            <select [(ngModel)]="data.selectedOption" name="option" required>
              <option value="" disabled selected>Choisir votre ville</option>
              <option value="option1">Kébili</option>
              <option value="option2">Sfax</option>
              <option value="option3">Sousse</option>
            </select>
          </div>
        </div>

        <div class="form-group full">
          <label>Sexe</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" [(ngModel)]="data.gender" name="gender" value="homme" required>
              <span>Homme</span>
            </label>
            <label class="radio-option">
              <input type="radio" [(ngModel)]="data.gender" name="gender" value="femme" required>
              <span>Femme</span>
            </label>
          </div>
        </div>

        <div class="form-group full">
          <label>Mot de passe</label>
          <input [(ngModel)]="data.password" name="password" type="password" placeholder="Votre mot de passe" required>
        </div>

        <div class="form-group full">
          <label>Confirmer le mot de passe</label>
          <input [(ngModel)]="data.confirmPassword" name="confirmPassword" type="password" placeholder="Confirmez votre mot de passe" required>
        </div>

        <button class="login-btn" type="submit">S'inscrire</button>

        <p class="register-link">Vous avez déjà un compte ? <a routerLink="/login">Se connecter</a></p>
      </form>
    </div>
  </div>
</div>
